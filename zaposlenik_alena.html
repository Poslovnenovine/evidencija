<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Alena">
<title>Alena Ahmetspahić-Fočo – Evidencija</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;--surface:#13151c;--border:#252836;
  --text:#eceef4;--muted:#5a6070;--gold:#f4c430;
  --green:#3dd68c;--orange:#ff6b35;--red:#ff4757;
  --gdim:rgba(61,214,140,.12);--odim:rgba(255,107,53,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Mono',monospace;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px 16px 40px;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(88,101,242,.15),transparent);
}
.avatar{
  width:76px;height:76px;border-radius:50%;
  background:linear-gradient(135deg,#2d3561,#1a237e);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:26px;color:var(--gold);
  margin:0 auto 16px;flex-shrink:0;
}
.emp-name{
  font-family:'DM Serif Display',serif;
  font-size:clamp(19px,5.5vw,27px);text-align:center;
  margin-bottom:3px;line-height:1.2;
}
.emp-sub{font-size:10px;color:var(--muted);text-align:center;letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px;}

.clock-wrap{text-align:center;margin-bottom:28px;}
.clock{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:clamp(48px,15vw,76px);color:var(--text);
  display:block;line-height:1;margin-bottom:5px;
}
.clock-date{font-size:11px;color:var(--muted);}

.scard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:20px 22px;width:100%;max-width:400px;
  margin-bottom:18px;text-align:center;transition:border-color .4s;
}
.scard.work{border-color:var(--green);}
.scard.done{border-color:var(--orange);}
.scard.abs {border-color:var(--gold);}
.slabel{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.sval{font-family:'DM Serif Display',serif;font-size:20px;color:var(--muted);transition:color .4s;}
.scard.work .sval{color:var(--green);}
.scard.done .sval{color:var(--orange);}
.scard.abs  .sval{color:var(--gold);}
.trow{display:flex;gap:18px;justify-content:center;margin-top:12px;font-size:11px;color:var(--muted);}
.ti{display:flex;flex-direction:column;align-items:center;gap:2px;}
.ti b{color:var(--text);font-size:14px;font-weight:400;}

.btnwrap{width:100%;max-width:400px;display:flex;flex-direction:column;gap:11px;margin-bottom:20px;}
.bigbtn{
  width:100%;padding:20px;border-radius:18px;border:none;
  font-family:'DM Serif Display',serif;font-size:21px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .12s,box-shadow .25s,background .2s;
  -webkit-user-select:none;user-select:none;
}
.bigbtn:active{transform:scale(.95);}
.bigbtn:disabled{opacity:.28;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
.bstart{background:var(--gdim);color:var(--green);border:2px solid rgba(61,214,140,.3);}
.bstart:hover:not(:disabled){background:rgba(61,214,140,.2);box-shadow:0 0 32px rgba(61,214,140,.2);}
.bend  {background:var(--odim);color:var(--orange);border:2px solid rgba(255,107,53,.3);}
.bend:hover:not(:disabled)  {background:rgba(255,107,53,.2);box-shadow:0 0 32px rgba(255,107,53,.2);}

.abssec{width:100%;max-width:400px;margin-bottom:18px;}
.abstitle{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;text-align:center;}
.absgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.absbtn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 5px;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--muted);cursor:pointer;transition:.18s;text-align:center;
  -webkit-user-select:none;user-select:none;
}
.absbtn:hover{color:var(--text);border-color:#3a3d4a;}
.absbtn:active{transform:scale(.95);}
.absbtn .ae{font-size:17px;display:block;margin-bottom:3px;}

.ind{
  font-size:10px;color:var(--muted);text-align:center;
  min-height:15px;margin-bottom:18px;transition:all .3s;letter-spacing:.03em;
}
.ind.ok {color:var(--green);}
.ind.err{color:var(--orange);}

/* Modal – bottom sheet */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:900;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px);}
.mo.on{display:flex;}
.mcard{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px 24px 0 0;padding:26px 22px 44px;
  width:100%;max-width:480px;
  animation:sup .28s cubic-bezier(.2,.8,.4,1);
}
@keyframes sup{from{transform:translateY(100%)}to{transform:none}}
.mh{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;}
.ms{font-size:11px;color:var(--muted);margin-bottom:18px;}
.mfl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;margin-top:11px;}
.mrow{display:flex;gap:8px;flex-wrap:wrap;}
.mrow>*{flex:1;min-width:120px;}
select,input[type=text],textarea{
  background:#0a0c10;border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:12px;
  padding:10px 12px;border-radius:10px;outline:none;width:100%;
  transition:border-color .2s;
}
select:focus,input:focus,textarea:focus{border-color:#4a5568;}
select option{background:var(--surface);}
textarea{resize:vertical;}
.mbo{
  display:none;margin-top:10px;padding:10px 12px;
  background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);
  border-radius:9px;font-size:11px;color:#ff8a80;line-height:1.5;
}
.mbtns{display:flex;gap:8px;margin-top:18px;}
.mbtn{flex:1;padding:14px;border-radius:12px;border:none;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:.15s;}
.mbtn:active{transform:scale(.96);}
.mok {background:var(--gold);color:#000;font-weight:500;}
.mno {background:#1e2029;color:var(--muted);border:1px solid var(--border);}

/* Toast */
.tw{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;width:92%;max-width:360px;}
.t{
  background:rgba(15,17,24,.96);border:1px solid var(--border);
  border-radius:14px;padding:13px 16px;font-size:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);margin-bottom:9px;
  display:flex;align-items:center;gap:10px;line-height:1.4;
  animation:tin .28s ease forwards;backdrop-filter:blur(12px);
}
.t.s{border-left:3px solid var(--green);}
.t.w{border-left:3px solid var(--gold);}
.t.e{border-left:3px solid var(--red);}
.ti2{font-size:17px;flex-shrink:0;}
@keyframes tin {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(6px)}}
</style>
</head>
<body>

<div class="avatar">AA</div>
<div class="emp-name">Alena Ahmetspahić-Fočo</div>
<div class="emp-sub">Poslovne Novine · Evidencija</div>

<div class="clock-wrap">
  <span class="clock" id="clk">--:--</span>
  <div class="clock-date" id="clkd"></div>
</div>

<div class="scard" id="sc">
  <div class="slabel">Status danas</div>
  <div class="sval" id="sv">Van posla</div>
  <div class="trow" id="tr" style="display:none">
    <div class="ti" id="tiin"  style="display:none"><span>Dolazak</span><b id="tin">–</b></div>
    <div class="ti" id="tiout" style="display:none"><span>Odlazak</span><b id="tout">–</b></div>
    <div class="ti" id="tihrs" style="display:none"><span>Provedeno</span><b id="thrs">–</b></div>
  </div>
</div>

<div class="btnwrap">
  <button class="bigbtn bstart" id="bin"  onclick="doIn()">▶ &nbsp;START</button>
  <button class="bigbtn bend"   id="bout" onclick="doOut()" disabled>■ &nbsp;KRAJ</button>
</div>

<div class="abssec">
  <div class="abstitle">Prijavite odsustvo</div>
  <div class="absgrid">
    <div class="absbtn" onclick="oAbs('GO')"><span class="ae">🏖️</span>Godišnji</div>
    <div class="absbtn" onclick="oAbs('BO')"><span class="ae">🏥</span>Bolovanje</div>
    <div class="absbtn" onclick="oAbs('PL')"><span class="ae">📄</span>Plaćeno</div>
    <div class="absbtn" onclick="oAbs('SD')"><span class="ae">✈️</span>Sl. put</div>
    <div class="absbtn" onclick="oAbs('NP')"><span class="ae">🎉</span>Praznik</div>
    <div class="absbtn" onclick="oAbs('DR')"><span class="ae">📌</span>Ostalo</div>
  </div>
</div>

<div class="ind" id="ind"></div>

<!-- Odsustvo modal -->
<div class="mo" id="mo" onclick="if(event.target===this)cMo()">
  <div class="mcard">
    <div class="mh">🗓️ Odsustvo</div>
    <div class="ms">Alena Ahmetspahić-Fočo</div>
    <label class="mfl">Vrsta odsustva</label>
    <select id="mtype" onchange="chkBO()">
      <option value="GO">🏖️ Godišnji odmor</option>
      <option value="BO">🏥 Bolovanje</option>
      <option value="PL">📄 Plaćeno odsustvo</option>
      <option value="NEO">📋 Neplaćeno odsustvo</option>
      <option value="NP">🎉 Neradni dan / Praznik</option>
      <option value="SD">✈️ Službeni put</option>
      <option value="PO">👶 Porodiljsko odsustvo</option>
      <option value="TP">🩹 Teža povreda radnika</option>
      <option value="DR">📌 Ostalo</option>
    </select>
    <div class="mrow">
      <div><label class="mfl">Datum od</label><input type="text" id="mfrom" placeholder="02.04.2026"></div>
      <div><label class="mfl">Datum do</label><input type="text" id="mto"   placeholder="opcionalno"></div>
    </div>
    <label class="mfl">Napomena</label>
    <textarea id="mnote" rows="2" placeholder="Opcionalno..."></textarea>
    <div class="mbo" id="mbo">⚠️ Za bolovanje je obavezno dostaviti liječničku doznaku HR odjeljenju.</div>
    <div class="mbtns">
      <button class="mbtn mok" onclick="subAbs()">✓ Potvrdi</button>
      <button class="mbtn mno" onclick="cMo()">Odustani</button>
    </div>
  </div>
</div>

<div class="tw" id="tw"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const N_URL  = "https://discord.com/api/webhooks/1489160856796270593/OznpmFSJ1US0ZVrcwf1xeO5L0mAQ6yW3f2NBqIwOExP35fHsru0gfQ4p6cn3oi81E31Q";
const EV_URL = "https://script.google.com/macros/s/AKfycbyW_OJjkP5szDk_h7o8h_gDqd15KUDwjad0IQAdEuCwgSJQ-QP-amXPqa7xMAYX7q8/exec"; // Google Sheets URL – popuniti naknadno ako je potrebno
const EMP    = "Alena Ahmetspahić-Fočo";
const STKEY  = "pn_alena";

// ─── Konstante ────────────────────────────────────────────────────────────────
const DANI  = ['Ned','Pon','Uto','Sri','Čet','Pet','Sub'];
const ALBL  = {GO:'Godišnji odmor',BO:'Bolovanje',PL:'Plaćeno odsustvo',NEO:'Neplaćeno odsustvo',NP:'Neradni dan',SD:'Službeni put',PO:'Porodiljsko odsustvo',TP:'Teža povreda',DR:'Ostalo'};
const AEMJ  = {GO:'🏖️',BO:'🏥',PL:'📄',NEO:'📋',NP:'🎉',SD:'✈️',PO:'👶',TP:'🩹',DR:'📌'};
const ACLR  = {GO:0x38bdf8,BO:0xf87171,PL:0xa78bfa,NEO:0x94a3b8,NP:0x64748b,SD:0xfb923c,PO:0xf472b6,TP:0xef4444,DR:0xa3e635};

// ─── State ────────────────────────────────────────────────────────────────────
let st = {};
function ldSt(){
  const today=new Date().toDateString();
  const s=JSON.parse(sessionStorage.getItem(STKEY)||'{}');
  st=(s.date===today)?(s.data||{}):{}; 
}
function svSt(){sessionStorage.setItem(STKEY,JSON.stringify({date:new Date().toDateString(),data:st}));}

// ─── Sat ──────────────────────────────────────────────────────────────────────
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent =n.toLocaleTimeString('bs-BA',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clkd').textContent=n.toLocaleDateString('bs-BA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
setInterval(tick,1000);tick();

// ─── Helpers ──────────────────────────────────────────────────────────────────
const nowT   =()=>new Date().toLocaleTimeString('bs-BA',{hour:'2-digit',minute:'2-digit'});
const todayS =()=>{const n=new Date();return`${p(n.getDate())}.${p(n.getMonth()+1)}.${n.getFullYear()}`;}
const p      =x=>String(x).padStart(2,'0');
const $      =id=>document.getElementById(id);
const show   =id=>$(id).style.display='flex';
const hide   =id=>$(id).style.display='none';
const set    =(id,v)=>$(id).textContent=v;

function ind(msg,cls){
  const e=$('ind');e.textContent=msg;e.className='ind'+(cls?' '+cls:'');
  if(cls) setTimeout(()=>{e.textContent='';e.className='ind';},3500);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  const sc=$('sc'),sv=$('sv'),tr=$('tr');
  const bi=$('bin'),bo=$('bout');
  sc.className='scard';tr.style.display='none';
  ['tiin','tiout','tihrs'].forEach(hide);

  if(st.absence){
    const c=st.absence.code;
    sv.textContent=(AEMJ[c]||'📋')+' '+(ALBL[c]||c);
    sc.classList.add('abs');bi.disabled=true;bo.disabled=true;
  } else if(st.checkIn&&!st.checkOut){
    sv.textContent='Na poslu od '+st.checkIn;
    sc.classList.add('work');tr.style.display='flex';
    show('tiin');set('tin',st.checkIn);
    bi.disabled=true;bo.disabled=false;
  } else if(st.checkOut){
    sv.textContent='Završio/la u '+st.checkOut;
    sc.classList.add('done');tr.style.display='flex';
    show('tiin');set('tin',st.checkIn);
    show('tiout');set('tout',st.checkOut);
    if(st.wStr){show('tihrs');set('thrs',st.wStr);}
    bi.disabled=true;bo.disabled=true;
  } else {
    sv.textContent='Van posla';bi.disabled=false;bo.disabled=true;
  }
}

// ─── Dolazak ──────────────────────────────────────────────────────────────────
async function doIn(){
  const t=nowT(),n=new Date();
  st={checkIn:t,checkInFull:n.toISOString()};
  svSt();render();ind('Evidentiram dolazak...');

  const dl=n.toLocaleDateString('bs-BA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  await send({embeds:[{
    title:'🟢 Dolazak na posao',color:0x3dd68c,
    fields:[
      {name:'👤 Zaposlenik',value:EMP,    inline:true},
      {name:'🕐 Vrijeme',   value:t,      inline:true},
      {name:'📅 Datum',     value:dl,     inline:false}
    ],
    footer:{text:'Poslovne Novine – Evidencija radnog vremena'},
    timestamp:n.toISOString()
  }]});

  await sheets({type:'checkin',employee:EMP,date:todayS(),day:DANI[n.getDay()],month:p(n.getMonth()+1),year:n.getFullYear(),time:t});
  ind('✓ Dolazak evidentiran','ok');
  toast('s','🟢','Dolazak zabilježen u '+t);
}

// ─── Odlazak ──────────────────────────────────────────────────────────────────
async function doOut(){
  const t=nowT(),n=new Date();
  let h=8,ot=0,wStr='';
  if(st.checkInFull){
    const d=n-new Date(st.checkInFull);
    const hh=Math.floor(d/3600000),mm=Math.floor((d%3600000)/60000);
    const tot=hh+mm/60;
    h=Math.max(0,Math.min(8,tot-.5));ot=Math.max(0,tot-8.5);
    wStr=`${hh}h ${mm}min`;
  }
  st.checkOut=t;st.checkOutFull=n.toISOString();st.wStr=wStr;
  svSt();render();ind('Evidentiram odlazak...');

  const dl=n.toLocaleDateString('bs-BA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const flds=[
    {name:'👤 Zaposlenik',value:EMP,inline:true},
    {name:'🕐 Odlazak',  value:t,  inline:true},
  ];
  if(st.checkIn) flds.push({name:'🟢 Dolazak',  value:st.checkIn,inline:true});
  if(wStr)       flds.push({name:'⏱️ Provedeno',value:wStr+(ot>0?' | ⚡ Prekovremeni: '+ot.toFixed(1)+'h':''),inline:false});
  flds.push({name:'📅 Datum',value:dl,inline:false});

  await send({embeds:[{title:'🔴 Odlazak sa posla',color:0xff6b35,fields:flds,footer:{text:'Poslovne Novine – Evidencija radnog vremena'},timestamp:n.toISOString()}]});
  await sheets({type:'checkout',employee:EMP,date:todayS(),day:DANI[n.getDay()],month:p(n.getMonth()+1),year:n.getFullYear(),time:t,hours:h.toFixed(2),overtime:ot.toFixed(2)});
  ind('✓ Odlazak evidentiran','ok');
  toast('s','🔴','Odlazak zabilježen u '+t+(wStr?' · '+wStr:''));
}

// ─── Odsustvo ─────────────────────────────────────────────────────────────────
function chkBO(){$('mbo').style.display=$('mtype').value==='BO'?'block':'none';}
function oAbs(code){
  $('mtype').value=code;$('mfrom').value=todayS();
  $('mto').value='';$('mnote').value='';
  $('mbo').style.display=code==='BO'?'block':'none';
  $('mo').classList.add('on');
}
function cMo(){$('mo').classList.remove('on');}

async function subAbs(){
  const code=$('mtype').value,from=$('mfrom').value.trim()||todayS();
  const to=$('mto').value.trim(),note=$('mnote').value.trim();
  cMo();
  st={absence:{code,from,to,note},checkIn:null,checkOut:null};
  svSt();render();ind('Prijavljujem odsustvo...');

  const em=AEMJ[code]||'📋',lbl=ALBL[code]||code,n=new Date();
  const flds=[
    {name:'👤 Zaposlenik',value:EMP,  inline:true},
    {name:`${em} Vrsta`, value:lbl,  inline:true},
    {name:'📅 Od',         value:from, inline:true},
  ];
  if(to)   flds.push({name:'📅 Do',       value:to,   inline:true});
  if(note) flds.push({name:'📝 Napomena', value:note,  inline:false});
  if(code==='BO') flds.push({name:'⚠️',value:'Obavezna liječnička doznaka.',inline:false});

  await send({embeds:[{
    title:`${em} Odsustvo – ${code}`,
    description:`**${EMP}** je prijavil/la odsustvo`,
    color:ACLR[code]||0x94a3b8,fields:flds,
    footer:{text:'Poslovne Novine – Evidencija radnog vremena'},
    timestamp:n.toISOString()
  }]});
  await sheets({type:'absence',employee:EMP,code,from,to,note,date:from,month:p(n.getMonth()+1),year:n.getFullYear(),day:DANI[n.getDay()]});
  ind('✓ Odsustvo evidentirano','ok');
  toast('w',em,lbl+' od '+from+(to?' do '+to:''));
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function send(body){
  try{await fetch(N_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}catch{}
}
async function sheets(data){
  if(!EV_URL)return;
  try{await fetch(EV_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});}catch{}
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(type,icon,msg){
  const w=$('tw'),t=document.createElement('div');
  t.className=`t ${type}`;
  t.innerHTML=`<span class="ti2">${icon}</span><span>${msg}</span>`;
  w.appendChild(t);
  setTimeout(()=>{t.style.animation='tout .3s ease forwards';setTimeout(()=>t.remove(),300);},4200);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
ldSt();render();
</script>
</body>
</html>
